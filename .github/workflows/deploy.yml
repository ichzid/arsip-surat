name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Laravel to VPS
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e  # Hentikan script jika ada error

            # Masuk ke direktori project di VPS
            cd /www/wwwroot/arsip-surat.ichmal.my.id

            # Pull perubahan terbaru dari GitHub
            git pull origin main

            # Install PHP dependencies
            composer install --no-dev --optimize-autoloader --no-interaction

            # Install & build JS/CSS assets
            npm install
            npm run build

            # Jalankan migrasi database (jika ada perubahan)
            php artisan migrate --force

            # Clear & cache semua config Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Set permission yang benar untuk storage & cache
            chown -R www:www storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            echo "✅ Deploy arsip-surat berhasil!"
